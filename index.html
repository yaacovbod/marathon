<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בקשת מרתון — נעימת הלב</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #F9FAFB;
      --white:    #FFFFFF;
      --accent:   #0891B2;
      --accent-l: #E0F2FE;
      --text:     #111111;
      --muted:    #6B7280;
      --border:   #E5E7EB;
      --sel:      #0891B2;
      --sel-l:    #BAE6FD;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    .header { text-align: center; margin-bottom: 36px; }
    .header h1 { font-size: 28px; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
    .header p  { color: var(--muted); font-size: 15px; }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
      direction: rtl;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-l);
    }

    textarea { min-height: 80px; resize: vertical; }

    /* ── Calendar ── */
    .cal-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .legend-dot {
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 20px;
    }

    .day-name {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      padding: 4px 0;
    }

    .cal-month-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }

    .day-cell {
      position: relative;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      border: 2px solid transparent;
      background: var(--bg);
      transition: background 0.1s, border-color 0.1s;
    }

    .day-cell:hover { background: var(--accent-l); }
    .day-cell.empty { cursor: default; background: transparent; }
    .day-cell.empty:hover { background: transparent; }
    .day-cell.shabbat { color: var(--muted); background: #F3F4F6; cursor: default; }
    .day-cell.shabbat:hover { background: #F3F4F6; }

    .day-cell.selected {
      background: var(--sel);
      color: #fff;
      border-color: var(--sel);
    }
    .day-cell.selected:hover { background: #0777A0; }

    /* נקודת אירוע */
    .event-dots {
      display: flex;
      gap: 2px;
      position: absolute;
      bottom: 3px;
    }

    .evt-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .day-cell.selected .evt-dot { opacity: 0.8; }

    /* מסגרת לפי סוג עיקרי */
    .day-cell.has-bagrut   { border-color: #FCA5A5; }
    .day-cell.has-meta     { border-color: #FCD34D; }
    .day-cell.has-holiday  { border-color: #6EE7B7; }

    /* טולטיפ */
    .exam-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      right: 50%;
      transform: translateX(50%);
      background: #1F2937;
      color: #fff;
      font-size: 11px;
      font-weight: 400;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
      max-width: 200px;
      white-space: normal;
      text-align: center;
    }
    .day-cell:hover .exam-tooltip { display: block; }

    /* סיכום תאריכים */
    .dates-summary { margin-top: 12px; min-height: 32px; font-size: 13px; color: var(--muted); }

    .date-tag {
      display: inline-block;
      background: var(--sel-l);
      color: var(--accent);
      border-radius: 20px;
      padding: 3px 10px;
      margin: 2px 3px;
      font-size: 12px;
      font-weight: 600;
    }

    /* כפתור שליחה */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #0777A0; }
    .submit-btn:disabled { background: #9CA3AF; cursor: not-allowed; }

    /* הצלחה */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    .success-icon {
      width: 72px; height: 72px;
      background: var(--accent-l);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }
    .success-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; color: var(--accent); }
    .success-screen p  { color: var(--muted); font-size: 15px; }

    /* שגיאה */
    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    /* ── אינדיקטור אירועים לנייד ── */
    #event-info {
      display: none;
      background: #1F2937;
      color: #fff;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── תווית אירוע בתוך תא — נייד ── */
    .evt-label {
      display: none;
      font-size: 9px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      overflow: hidden;
      max-width: 100%;
      padding: 0 2px;
      word-break: break-word;
    }

    @media (max-width: 520px) {
      .wrap { padding: 16px 10px 48px; }

      .header { margin-bottom: 20px; }
      .header h1 { font-size: 22px; }
      .header p  { font-size: 13px; }

      .card { padding: 16px 12px; border-radius: 10px; }
      .card-title { font-size: 15px; margin-bottom: 12px; }

      input[type="text"], textarea { font-size: 16px; }

      .cal-legend { font-size: 11px; gap: 10px; margin-bottom: 10px; }
      .legend-dot { width: 8px; height: 8px; }

      .cal-month-title { font-size: 14px; }
      .day-name { font-size: 11px; padding: 3px 0; }

      .day-cell {
        aspect-ratio: unset;
        min-height: 56px;
        font-size: 12px;
        border-radius: 6px;
        border-width: 1.5px;
        justify-content: flex-start;
        padding-top: 5px;
        gap: 2px;
      }

      /* מציג תווית ומסתיר נקודות */
      .evt-label { display: block; }
      .event-dots { display: none; }
      .exam-tooltip { display: none !important; }

      /* צבע תווית לפי קטגוריה */
      .evt-label.bagrut   { color: #EF4444; }
      .evt-label.metakonet,
      .evt-label.mivhan   { color: #D97706; }
      .evt-label.holiday,
      .evt-label.trip     { color: #059669; }

      .day-cell.selected .evt-label { color: rgba(255,255,255,0.9); }

      #event-info { display: none !important; }

      .dates-summary { font-size: 12px; }
      .date-tag { font-size: 11px; padding: 2px 8px; }
      .submit-btn { font-size: 15px; padding: 13px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>בקשת יום מרתון</h1>
    <p>בחר תאריכים על הלוח — הבגרויות וימי החופש מסומנים</p>
  </div>

  <div id="form-area">

    <!-- פרטי מורה + הצדקה -->
    <div class="card">
      <div class="card-title">פרטי הבקשה</div>
      <div class="field">
        <label for="teacherName">שם המורה</label>
        <input type="text" id="teacherName" placeholder="שם פרטי ושם משפחה" autocomplete="name">
      </div>
      <div class="field">
        <label for="subject">מקצוע</label>
        <input type="text" id="subject" placeholder="למשל: מתמטיקה, לשון, היסטוריה...">
      </div>
      <div class="field">
        <label for="reason">הצדקה / הסבר לבקשה</label>
        <textarea id="reason" placeholder="בגרות / מתכונת / מטלות בתוכנית הבגרויות הגמישה"></textarea>
      </div>
    </div>

    <!-- לוח שנה -->
    <div class="card">
      <div class="card-title">תאריכים מבוקשים לימי מרתון</div>
      <div class="cal-legend">
        <span><span class="legend-dot" style="background:var(--sel)"></span> ימים שבחרת</span>
        <span><span class="legend-dot" style="background:#EF4444"></span> בגרות</span>
        <span><span class="legend-dot" style="background:#F59E0B"></span> מתכונת / מבחן</span>
        <span><span class="legend-dot" style="background:#10B981"></span> חופשה</span>
      </div>
      <div id="calendar"></div>
      <div id="event-info"></div>
      <div class="dates-summary" id="dates-summary">לא נבחרו תאריכים עדיין</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">שלח בקשה</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✓</div>
    <h2>הבקשה נשלחה בהצלחה!</h2>
    <p>הבקשה התקבלה ותיבדק בהקדם.</p>
  </div>
</div>

<iframe name="submit-target" style="display:none"></iframe>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyFDlBHn07-bzcBGhok5pVsrFsQcvwspYEf8DF8toXFzog-qhkerIbNc361-Xij3W2VAg/exec';
const EXAM11_URL = 'https://exam11-next.vercel.app/api/events';

const MONTHS = [
  { year: 2026, month: 4, label: 'מאי 2026' },
  { year: 2026, month: 5, label: 'יוני 2026' },
  { year: 2026, month: 6, label: 'יולי 2026' },
];
const DAY_NAMES = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

// נתוני fallback — כל אירועי מאי–יולי 2026 מ-exam11
const FALLBACK_EVENTS = [
  { start:'20260504', end:'20260505', events:[{title:'מתכונת שנייה במתמטיקה', cat:'metakonet'},{title:'מתכונת בניהול עסקי', cat:'metakonet'}]},
  { start:'20260505', end:'20260506', events:[{title:'לג בעומר', cat:'holiday'}]},
  { start:'20260506', end:'20260507', events:[{title:'מתכונת באנגלית', cat:'metakonet'}]},
  { start:'20260507', end:'20260508', events:[{title:'בגרות בלשון', cat:'bagrut'},{title:'מתכונת שיפור במתמטיקה', cat:'metakonet'}]},
  { start:'20260510', end:'20260511', events:[{title:'מתכונת שיפור במתמטיקה לניגשי לשון', cat:'metakonet'}]},
  { start:'20260512', end:'20260513', events:[{title:'בגרות מתמטיקה 3 ו4 יח"ל', cat:'bagrut'}]},
  { start:'20260513', end:'20260514', events:[{title:'בגרות במתמטיקה 5 יח"ל', cat:'bagrut'},{title:'מתכונת משלימים באנגלית', cat:'metakonet'}]},
  { start:'20260517', end:'20260518', events:[{title:'מתכונת בפיזיקה', cat:'metakonet'}]},
  { start:'20260518', end:'20260519', events:[{title:'בגרות באנגלית 3 ו5 יח"ל', cat:'bagrut'}]},
  { start:'20260519', end:'20260520', events:[{title:'בגרות באנגלית 4 יח"ל', cat:'bagrut'}]},
  { start:'20260520', end:'20260521', events:[{title:'מתכונת בניהול עסקי', cat:'metakonet'},{title:'מתכונת מידע ונתונים', cat:'metakonet'}]},
  { start:'20260521', end:'20260523', events:[{title:'שבועות', cat:'holiday'}]},
  { start:'20260522', end:'20260523', events:[{title:'שבועות', cat:'holiday'}]},
  { start:'20260524', end:'20260526', events:[{title:'טיול שנתי', cat:'trip'}]},
  { start:'20260525', end:'20260526', events:[{title:'טיול שנתי', cat:'trip'}]},
  { start:'20260528', end:'20260529', events:[{title:'מתכונת במדעי המחשב', cat:'metakonet'},{title:'בגרות תנ"ך', cat:'bagrut'}]},
  { start:'20260531', end:'20260601', events:[{title:'הדמייה מידע ונתונים', cat:'metakonet'}]},
  { start:'20260601', end:'20260602', events:[{title:'מבחן בביולוגיה', cat:'mivhan'},{title:'מתכונת בפסיכולוגיה', cat:'metakonet'}]},
  { start:'20260602', end:'20260603', events:[{title:'מתכונת בפיזיקה', cat:'metakonet'}]},
  { start:'20260604', end:'20260605', events:[{title:'בגרות בניהול עסקי', cat:'bagrut'},{title:'מבחן באומנות', cat:'mivhan'},{title:'מבחן בתקשורת', cat:'mivhan'},{title:'מתכונת במוט"ל', cat:'metakonet'}]},
  { start:'20260608', end:'20260609', events:[{title:'בגרות פנימית בספרות', cat:'bagrut'}]},
  { start:'20260610', end:'20260611', events:[{title:'מתכונת בפיזיקה', cat:'metakonet'}]},
  { start:'20260611', end:'20260612', events:[{title:'בגרות פנימית בספרות מועד ב\'', cat:'bagrut'}]},
  { start:'20260615', end:'20260616', events:[{title:'בגרות במוט"ל', cat:'bagrut'},{title:'בגרות בפיזיקה', cat:'bagrut'},{title:'מתכונת בפסיכולוגיה', cat:'metakonet'}]},
  { start:'20260622', end:'20260623', events:[{title:'בגרות בפסיכולוגיה', cat:'bagrut'}]},
  { start:'20260625', end:'20260626', events:[{title:'בגרות במידע ונתונים', cat:'bagrut'},{title:'בגרות במדעי המחשב', cat:'bagrut'}]},
  { start:'20260629', end:'20260630', events:[{title:'בגרות מדעי המחשב (תלמידי מידע ונתונים)', cat:'bagrut'}]},
  { start:'20260630', end:'20260701', events:[{title:'בגרות באנגלית (מועד ב\')', cat:'bagrut'}]},
  { start:'20260706', end:'20260707', events:[{title:'בגרות במתמטיקה (מועד ב\')', cat:'bagrut'}]},
  { start:'20260709', end:'20260710', events:[{title:'בגרות בלשון (מועד ב\')', cat:'bagrut'}]},
];

const DOT_COLORS = {
  bagrut:    '#EF4444',
  metakonet: '#F59E0B',
  mivhan:    '#F59E0B',
  holiday:   '#10B981',
  trip:      '#10B981',
  army:      '#10B981',
  special:   '#8B5CF6',
};

let selectedDates = new Set();
let eventDates = {};

function buildEventMap(items) {
  items.forEach(item => {
    const key = item.start;
    if (!eventDates[key]) eventDates[key] = [];
    (item.events || []).forEach(ev => {
      eventDates[key].push({ title: ev.title, cat: ev.cat });
    });
  });
}

async function loadExams() {
  try {
    const res = await fetch(EXAM11_URL);
    const data = await res.json();
    const allItems = data.flatMap(mg => mg.items || []);
    buildEventMap(allItems);
  } catch (e) {
    buildEventMap(FALLBACK_EVENTS);
  }
  renderCalendar();
}

function dateKey(year, month, day) {
  return `${year}${String(month + 1).padStart(2, '0')}${String(day).padStart(2, '0')}`;
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  MONTHS.forEach(({ year, month, label }) => {
    const title = document.createElement('div');
    title.className = 'cal-month-title';
    title.textContent = label;
    cal.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    DAY_NAMES.forEach(d => {
      const n = document.createElement('div');
      n.className = 'day-name';
      n.textContent = d;
      grid.appendChild(n);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(year, month, d);
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const dow = new Date(year, month, d).getDay();
      if (dow === 6) { cell.classList.add('shabbat'); }

      if (selectedDates.has(key)) cell.classList.add('selected');

      const events = eventDates[key] || [];

      // קביעת מסגרת לפי עדיפות
      const hasBagrut   = events.some(e => e.cat === 'bagrut');
      const hasMeta     = events.some(e => e.cat === 'metakonet' || e.cat === 'mivhan');
      const hasHoliday  = events.some(e => e.cat === 'holiday' || e.cat === 'trip' || e.cat === 'army');

      if (hasBagrut)        cell.classList.add('has-bagrut');
      else if (hasMeta)     cell.classList.add('has-meta');
      else if (hasHoliday)  cell.classList.add('has-holiday');

      // מספר יום
      const num = document.createElement('span');
      num.textContent = d;
      cell.appendChild(num);

      // נקודות אירועים (דסקטופ) + תוויות (נייד)
      if (events.length > 0) {
        const dotsEl = document.createElement('div');
        dotsEl.className = 'event-dots';
        const seen = new Set();
        events.forEach(ev => {
          const color = DOT_COLORS[ev.cat] || '#9CA3AF';
          if (!seen.has(color)) {
            seen.add(color);
            const dot = document.createElement('span');
            dot.className = 'evt-dot';
            dot.style.background = color;
            dotsEl.appendChild(dot);
          }
        });
        cell.appendChild(dotsEl);

        // תווית טקסט לנייד — אירוע עיקרי בלבד
        const primary = events.find(e => e.cat === 'bagrut') ||
                        events.find(e => e.cat === 'metakonet' || e.cat === 'mivhan') ||
                        events.find(e => e.cat === 'holiday' || e.cat === 'trip') ||
                        events[0];
        const lbl = document.createElement('span');
        lbl.className = 'evt-label ' + primary.cat;
        const clean = primary.title
          .replace(/^בגרות ב?/, '').replace(/^מתכונת ב?/, '').replace(/^מבחן ב?/, '');
        lbl.textContent = clean.length > 12 ? clean.slice(0, 11) + '…' : clean;
        cell.appendChild(lbl);

        const tip = document.createElement('div');
        tip.className = 'exam-tooltip';
        tip.textContent = events.map(e => e.title).join(' | ');
        cell.appendChild(tip);
      }

      if (dow !== 6) {
        cell.addEventListener('click', () => toggleDate(key, events));
      }

      grid.appendChild(cell);
    }

    cal.appendChild(grid);
  });
}

const isMobile = () => window.innerWidth <= 520;

function toggleDate(key, events) {
  if (selectedDates.has(key)) selectedDates.delete(key);
  else selectedDates.add(key);
  renderCalendar();
  updateSummary();

  if (isMobile() && events && events.length > 0) {
    const el = document.getElementById('event-info');
    el.textContent = events.map(e => e.title).join(' | ');
    el.style.display = 'block';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }
}

function updateSummary() {
  const el = document.getElementById('dates-summary');
  if (selectedDates.size === 0) { el.textContent = 'לא נבחרו תאריכים עדיין'; return; }
  const sorted = Array.from(selectedDates).sort();
  el.innerHTML = sorted.map(k => {
    const y = k.slice(0,4), m = k.slice(4,6), d = k.slice(6,8);
    return `<span class="date-tag">${d}/${m}/${y}</span>`;
  }).join('');
}

function validateForm() {
  if (!document.getElementById('teacherName').value.trim()) return 'נא למלא שם מורה';
  if (!document.getElementById('subject').value.trim()) return 'נא למלא מקצוע';
  if (selectedDates.size === 0) return 'נא לבחור לפחות תאריך אחד';
  return null;
}

function submitForm() {
  const err = validateForm();
  const errEl = document.getElementById('errorMsg');
  if (err) { errEl.textContent = err; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'שולח...';

  const sorted = Array.from(selectedDates).sort();
  const isoArr = sorted.map(k => `${k.slice(0,4)}-${k.slice(4,6)}-${k.slice(6,8)}`);

  const params = {
    sheetName:   'מרתון',
    timestamp:   new Date().toISOString(),
    teacherName: document.getElementById('teacherName').value.trim(),
    subject:     document.getElementById('subject').value.trim(),
    dates:       JSON.stringify(isoArr),
    reason:      document.getElementById('reason').value.trim(),
  };

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = APPS_SCRIPT_URL;
  form.target = 'submit-target';
  Object.entries(params).forEach(([k, v]) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = k; inp.value = v;
    form.appendChild(inp);
  });
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  setTimeout(() => {
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  }, 1200);
}

loadExams();
</script>
